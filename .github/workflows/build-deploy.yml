name: Build and Deploy

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'helm/values.yaml'
      - 'argocd/rendered-deployment.yaml'

env:
  APP_NAME: ${{ github.event.repository.name }}
  REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
  TARGET_REVISION: ${{ github.ref_name }}
  HELM_PATH: helm
  DESTINATION_NAMESPACE: ${{ github.event.repository.name }}
  ARGOCD_NAMESPACE: argocd
  ARGOCD_PROJECT: default

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set short SHA
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Render ArgoCD Application manifest
        run: envsubst < argocd/deployment.yaml > argocd/rendered-deployment.yaml

      - name: Update Helm values with new image tag
        run: |
          sed -i "s/tag:.*/tag: ${{ env.SHORT_SHA }}/" ${{ env.HELM_PATH }}/values.yaml

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.HELM_PATH }}/values.yaml argocd/rendered-deployment.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: bump image tag to ${{ env.SHORT_SHA }} [skip ci]"
          git push

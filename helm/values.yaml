replicaCount: 2

image:
  repository: ghcr.io/paulodhiambo/concept
  pullPolicy: IfNotPresent
  tag: ef6ed3b

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

istio:
  enabled: true
  host: concept.example.com
  gateway: istio-system/ingressgateway
  retries:
    attempts: 3
    perTryTimeout: 5s

probes:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 20
    periodSeconds: 5
    failureThreshold: 3

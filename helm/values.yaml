replicaCount: 2

image:
  repository: ghcr.io/paulodhiambo/concept
  pullPolicy: IfNotPresent
  tag: 701063e

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

istio:
  enabled: false
  host: concept.example.com
  gateway: istio-system/ingressgateway
  retries:
    attempts: 3
    perTryTimeout: 5s

ingress:
  enabled: true
  baseDomain: cluster.lakesideinn.space
  auth:
    enabled: true

database:
  configMap:
    name: "concept-db-config"
  secret:
    name: "concept-db-secret"
    usernameKey: username
    passwordKey: password

probes:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 5
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 45
    periodSeconds: 10
    failureThreshold: 5
